<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NavaGator - Enterprise Project Tracker</title>
  <meta name="description"
    content="Tracks and visualizes enterprise projects across departments with timelines, delays, responsibilities, and procurement details to enhance management and accountability.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- CDN Libraries -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="/app-v2.css">
</head>

<body>

  <div class="app-layout">

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="app-sidebar">
      <!-- Populated dynamically by app-v2.js -->
    </aside>

    <!-- Main Panel -->
    <main class="main-panel">
      <header class="main-header" id="main-header">
        <div style="display:flex;align-items:center;gap:16px">
          <h1 id="main-header-title" style="margin:0">Analytical Dashboard</h1>
          <select id="header-dept-filter" class="form-input" style="width:160px;margin-bottom:0;padding:4px 8px;font-size:11px;background:rgba(28,6,23,0.6);border:1px solid rgba(59,17,48,0.8);color:white;display:none;height:28px;border-radius:6px;cursor:pointer"></select>
        </div>
        <button class="btn-primary" id="create-project-btn" style="display:none">
          <i data-lucide="plus"></i>
          <span>Create Project</span>
        </button>
      </header>

      <!-- View Content Area -->
      <div class="view-container" id="view-container">
        <!-- Rendered by JavaScript -->
      </div>
    </main>

  </div>

  <!-- Toast Notification -->
  <div id="app-toast" class="toast"></div>

  <!-- Main Application Script -->
  <script src="/app-v2.js"></script>
</body>

</html>
